<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics Login — Ikram Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#0F1117;--surface:#161B27;--card:#1E2535;--border:#2A3347;--amber:#D4820A;--amber-l:#F0A830;--text:#E2E8F0;--muted:#64748B;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .mono{font-family:'DM Mono',monospace;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;}
    .inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
    .inp:focus{border-color:var(--amber);}
    .inp::placeholder{color:var(--muted);}
    .lbl{display:block;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .btn{width:100%;background:var(--amber);color:white;font-weight:600;font-size:.88rem;letter-spacing:.05em;text-transform:uppercase;padding:14px;border-radius:8px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s;}
    .btn:hover{opacity:.9;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card{animation:fadeUp .4s ease;}
  </style>
</head>
<body>
  <div style="position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(212,130,10,.08),transparent 70%);pointer-events:none;"></div>

  <div style="width:100%;padding:20px;">
    <div class="card" style="margin:0 auto;">
      <!-- Logo -->
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:'DM Mono',monospace;font-size:2rem;font-weight:700;color:var(--amber);letter-spacing:-.02em;">IH<span style="color:#C0421A;font-style:italic;">.</span></div>
        <div style="margin-top:8px;font-size:.95rem;font-weight:600;">Analytics Dashboard</div>
        <div style="margin-top:4px;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);">Admin access only</div>
      </div>

      {% if error %}
      <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:.82rem;color:#FCA5A5;display:flex;align-items:center;gap:8px;">
        <span>⚠</span> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'analytics_login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
          <label class="lbl">Username</label>
          <input type="text" name="username" class="inp" placeholder="admin" autofocus autocomplete="username" required/>
        </div>
        <div style="margin-bottom:24px;">
          <label class="lbl">Password</label>
          <input type="password" name="password" class="inp" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn">Sign In →</button>
      </form>

      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center;">
        <a href="/" style="font-size:.78rem;color:var(--muted);text-decoration:none;font-family:'DM Mono',monospace;transition:color .2s;" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='var(--muted)'">← Back to Portfolio</a>
      </div>
    </div>
  </div>
</body>
</html>
