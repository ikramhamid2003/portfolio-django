<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#0F1117;--surface:#161B27;--card:#1E2535;--border:#2A3347;--amber:#D4820A;--text:#E2E8F0;--muted:#64748B;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Outfit',sans-serif;}
    .inp:focus{border-color:var(--amber);}
    .inp::placeholder{color:var(--muted);}
    .btn{width:100%;background:var(--amber);color:white;font-weight:600;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:13px;border-radius:8px;border:none;cursor:pointer;transition:opacity .2s;font-family:'Outfit',sans-serif;}
    .btn:hover{opacity:.9;}
    .lbl{display:block;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:16px;}
  </style>
</head>
<body>
  <div style="width:100%;max-width:380px;padding:24px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;">
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:2rem;margin-bottom:8px;">📊</div>
        <h1 style="font-size:1.3rem;font-weight:600;margin-bottom:4px;">Analytics Login</h1>
        <p style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);">ikramhamidpk.dev / analytics</p>
      </div>
      {% if form.errors %}
      <div class="error">Invalid username or password. Try again.</div>
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}"/>
        <div style="margin-bottom:16px;">
          <label class="lbl">Username</label>
          <input type="text" name="username" class="inp" placeholder="admin" autofocus/>
        </div>
        <div style="margin-bottom:24px;">
          <label class="lbl">Password</label>
          <input type="password" name="password" class="inp" placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn">Login →</button>
      </form>
      <div style="text-align:center;margin-top:20px;">
        <a href="/" style="font-size:.8rem;color:var(--muted);text-decoration:none;">← Back to Portfolio</a>
      </div>
    </div>
  </div>
</body>
</html>
